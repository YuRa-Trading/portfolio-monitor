<header class="header">
  <a class="header-left" href="https://yuratrading.com" target="_blank" rel="noopener noreferrer">
    @if (theme().mode() === 'dark') {
      <img class="logo" src="/logo-dark-icon.svg" alt="YuRa Logo" />
    } @else {
      <img class="logo" src="/logo-light-icon.svg" alt="YuRa Logo" />
    }
    <div>
      <h1 class="header-title">YuRa Trading</h1>
      <span class="header-sub">PORTFOLIO MONITOR</span>
    </div>
  </a>

  <div class="header-right">
    <span class="live-dot"></span>
    <span class="live-label">LIVE</span>

    @if (lastUpdate()) {
      <span class="last-update mono">{{ lastUpdate() | date:'HH:mm:ss' }}</span>
    }

    <button class="refresh-btn" (click)="onRefresh.emit()" title="Refresh">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>

    <button class="theme-btn" (click)="theme().toggle()" title="Toggle theme">
      @if (theme().mode() === 'dark') {
        <!-- Sun icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      } @else {
        <!-- Moon icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      }
    </button>
  </div>
</header>
